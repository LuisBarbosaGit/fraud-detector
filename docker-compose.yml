services:
  api1:
    build: .
    container_name: rinha_api_1
    environment:
      - REDIS_URL=redis://redis-stack:6379
      - PORT=3000
    expose:
      - "3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "100MB"

  api2:
    build: .
    container_name: rinha_api_2
    environment:
      - REDIS_URL=redis://redis-stack:6379
      - PORT=3000
    expose:
      - "3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "100MB"

  nginx:
    image: nginx:1.27-alpine
    container_name: rinha_nginx
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "40MB"

  redis-stack:
    image: redis/redis-stack-server:latest
    container_name: rinha_redis_stack
    ports:
      - "6379:6379"
    restart: unless-stopped
